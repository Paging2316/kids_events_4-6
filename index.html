<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wien mit Kindern · 4–6 Jahre</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fdf8f3;--ink:#1a1612;--muted:#6b5f54;--border:#e8e0d8;
  --card:#fff;--accent:#e8411e;--radius:12px;
  --c-theater:#7c3aed;--c-museum:#2563a8;--c-natur:#1a9e5f;
  --c-sport:#e8411e;--c-musik:#db2777;--c-kreativ:#c47d0e;
  --c-kino:#0891b2;--c-spielen:#65a30d;--c-saisonal:#dc2626;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink)}

/* HEADER */
header{background:var(--ink);color:#fdf8f3;padding:20px 28px;position:sticky;top:0;z-index:200;border-bottom:3px solid var(--accent)}
.hdr{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
h1{font-family:'Fraunces',serif;font-size:1.55rem;font-weight:900;letter-spacing:-.02em}
h1 span{color:var(--accent)}
.hdr-sub{font-size:.72rem;opacity:.6;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.hdr-stats{display:flex;gap:16px;margin-left:auto}
.stat{text-align:center}
.stat-n{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:700;color:var(--accent);line-height:1}
.stat-l{font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;opacity:.6}

/* FILTERS */
.filters{background:var(--card);border-bottom:1px solid var(--border);padding:12px 28px;position:sticky;top:82px;z-index:100}
.filters-inner{max-width:1400px;margin:0 auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.fl{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;white-space:nowrap}
.sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.fb{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:.75rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s}
.fb:hover{border-color:var(--ink);color:var(--ink)}
.fb.on{background:var(--ink);border-color:var(--ink);color:#fff}
.fb.on[data-f="Theater"]{background:var(--c-theater);border-color:var(--c-theater)}
.fb.on[data-f="Museum"]{background:var(--c-museum);border-color:var(--c-museum)}
.fb.on[data-f="Natur"]{background:var(--c-natur);border-color:var(--c-natur)}
.fb.on[data-f="Sport"]{background:var(--c-sport);border-color:var(--c-sport)}
.fb.on[data-f="Musik"]{background:var(--c-musik);border-color:var(--c-musik)}
.fb.on[data-f="Kreativ"]{background:var(--c-kreativ);border-color:var(--c-kreativ)}
.fb.on[data-f="Kino"]{background:var(--c-kino);border-color:var(--c-kino)}
.fb.on[data-f="Spielen"]{background:var(--c-spielen);border-color:var(--c-spielen)}
.fb.on[data-f="Saisonal"]{background:var(--c-saisonal);border-color:var(--c-saisonal)}
.srch{margin-left:auto;position:relative}
.srch input{padding:6px 12px 6px 32px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg);font-size:.77rem;color:var(--ink);font-family:'DM Sans',sans-serif;outline:none;width:190px;transition:border-color .15s}
.srch input:focus{border-color:var(--accent)}
.srch-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.8rem;pointer-events:none}

/* MAIN */
main{max-width:1400px;margin:0 auto;padding:20px 28px 60px}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.rc{font-size:.8rem;color:var(--muted)}.rc strong{color:var(--ink)}
.vt{display:flex;gap:3px;background:var(--border);border-radius:7px;padding:2px}
.vb{padding:4px 12px;border-radius:5px;border:none;font-size:.75rem;font-weight:500;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;background:transparent;transition:all .15s}
.vb.on{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1)}

/* CATEGORY SECTION */
.cat-sec{margin-bottom:32px}
.cat-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-hdr h2{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700}
.cat-cnt{font-size:.72rem;color:var(--muted);background:var(--border);padding:2px 7px;border-radius:9px}

/* GRID */
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.egrid.lv{grid-template-columns:1fr;gap:7px}

/* CARD */
.ec{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);cursor:pointer;transition:box-shadow .18s,transform .18s;position:relative;overflow:hidden}
.ec:hover{box-shadow:0 6px 28px rgba(26,22,18,.13);transform:translateY(-2px)}
.ec.open{border-color:var(--ink);box-shadow:0 6px 28px rgba(26,22,18,.13)}
.ec-stripe{height:3px;width:100%}
.ec[data-cat="Theater"] .ec-stripe{background:var(--c-theater)}
.ec[data-cat="Museum"]  .ec-stripe{background:var(--c-museum)}
.ec[data-cat="Natur"]   .ec-stripe{background:var(--c-natur)}
.ec[data-cat="Sport"]   .ec-stripe{background:var(--c-sport)}
.ec[data-cat="Musik"]   .ec-stripe{background:var(--c-musik)}
.ec[data-cat="Kreativ"] .ec-stripe{background:var(--c-kreativ)}
.ec[data-cat="Kino"]    .ec-stripe{background:var(--c-kino)}
.ec[data-cat="Spielen"] .ec-stripe{background:var(--c-spielen)}
.ec[data-cat="Saisonal"].ec-stripe{background:var(--c-saisonal)}

.ec-hdr{padding:12px 13px 0}
.ec-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.ec-title{font-family:'Fraunces',serif;font-size:.95rem;font-weight:700;line-height:1.25;flex:1}
.ec-arr{font-size:.75rem;color:var(--muted);flex-shrink:0;margin-top:2px;transition:transform .2s}
.ec.open .ec-arr{transform:rotate(180deg)}
.ec-sub{font-size:.72rem;color:var(--muted);line-height:1.4;margin-bottom:8px}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.b{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:5px;font-size:.64rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.b-in{background:#dbeafe;color:#1e40af}
.b-out{background:#dcfce7;color:#166534}
.b-free{background:#dcfce7;color:#166534}
.b-paid{background:#fef3c7;color:#92400e}
.b-reg{background:#fee2e2;color:#991b1b}
.b-tag{background:#f3f4f6;color:#374151}

/* QUICK BAR */
.qbar{display:flex;border-top:1px solid var(--border)}
.qi{flex:1;padding:7px 8px;text-align:center;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:1px}
.qi:last-child{border-right:none}
.qi-ic{font-size:.9rem;line-height:1}
.qi-v{font-size:.64rem;font-weight:600;color:var(--ink);line-height:1.2}
.qi-k{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}

/* DETAILS */
.ec-det{display:none;border-top:1px solid var(--border);padding:13px;background:#fcfaf8}
.ec.open .ec-det{display:block;animation:sd .18s ease-out}
@keyframes sd{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.det-desc{font-size:.77rem;color:var(--muted);line-height:1.55;margin-bottom:11px;padding:9px;background:var(--bg);border-radius:7px;border-left:3px solid var(--border)}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px 14px;margin-bottom:11px}
.det-k{font-size:.6rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:600;margin-bottom:2px}
.det-v{font-size:.78rem;color:var(--ink);line-height:1.4}
.det-link{display:inline-flex;align-items:center;gap:5px;font-size:.73rem;font-weight:600;color:var(--c-museum);text-decoration:none;padding:5px 11px;border:1.5px solid var(--c-museum);border-radius:5px;transition:all .15s}
.det-link:hover{background:var(--c-museum);color:#fff}

/* LIST VIEW */
.egrid.lv .ec{display:grid;grid-template-columns:4px 1fr}
.egrid.lv .ec-stripe{grid-row:1/99;border-radius:var(--radius) 0 0 var(--radius);width:4px;height:auto}
.egrid.lv .ec-hdr{display:flex;align-items:center;gap:12px;padding:9px 13px;flex-wrap:wrap}
.egrid.lv .ec-top{margin-bottom:0;min-width:180px}
.egrid.lv .ec-sub{margin-bottom:0}
.egrid.lv .badges{flex:1;justify-content:flex-end;margin-bottom:0}
.egrid.lv .qbar{display:none}
.egrid.lv .ec-det{grid-column:2}

/* EMPTY */
.empty{text-align:center;padding:50px;color:var(--muted);grid-column:1/-1}
.empty-em{font-size:2.5rem;margin-bottom:10px}

/* LEGEND */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;padding:10px 14px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);font-size:.68rem;color:var(--muted);align-items:center}
.legend strong{color:var(--ink);font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;margin-right:4px}
.li{display:flex;align-items:center;gap:4px}

@media(max-width:680px){
  header{padding:14px 16px}
  .filters{padding:10px 16px;top:74px}
  main{padding:14px 16px 40px}
  .egrid{grid-template-columns:1fr}
  .hdr-stats{display:none}
  .srch{display:none}
}
</style>
</head>

  var ib=e.indoor?'<span class="b b-in">🏠 Indoor</span>':'<span class="b b-out">🌳 Outdoor</span>';
  var pb=e.gratis?'<span class="b b-free">💚 Gratis</span>':'<span class="b b-paid">💰 Kostenpflichtig</span>';
  var rb=e.reg?'<span class="b b-reg">⚠ Anmeldung</span>':'';
  var tags=e.tags.slice(0,3).map(function(t){return'<span class="b b-tag">'+t+'</span>';}).join('');
  var freq=e.freq.length>18?e.freq.substring(0,16)+'…':e.freq;
  return '<div class="ec" data-cat="'+e.cat+'" data-id="'+e.id+'">'+
    '<div class="ec-stripe"></div>'+
    '<div class="ec-hdr">'+
      '<div class="ec-top"><div class="ec-title">'+e.title+'</div><div class="ec-arr">▾</div></div>'+
      '<div class="ec-sub">'+e.sub+'</div>'+
      '<div class="badges">'+ib+pb+rb+tags+'</div>'+
    '</div>'+
    '<div class="qbar">'+
      '<div class="qi"><div class="qi-ic">📍</div><div class="qi-v">'+e.locS+'</div><div class="qi-k">Bezirk</div></div>'+
      '<div class="qi"><div class="qi-ic">👶</div><div class="qi-v">'+e.alter+'</div><div class="qi-k">Alter</div></div>'+
      '<div class="qi"><div class="qi-ic">🔄</div><div class="qi-v">'+freq+'</div><div class="qi-k">Häufigkeit</div></div>'+
    '</div>'+
    '<div class="ec-det">'+
      '<div class="det-desc">'+e.desc+'</div>'+
      '<div class="det-grid">'+
        '<div><div class="det-k">Preis</div><div class="det-v">'+e.preis+'</div></div>'+
        '<div><div class="det-k">Anmeldung</div><div class="det-v">'+(e.reg?'✅ Ja, erforderlich':'❌ Nicht nötig')+'</div></div>'+
        '<div><div class="det-k">Adresse</div><div class="det-v">'+e.loc+'</div></div>'+
        '<div><div class="det-k">Häufigkeit</div><div class="det-v">'+e.freq+'</div></div>'+
      '</div>'+
      '<a href="'+e.link+'" target="_blank" class="det-link" onclick="event.stopPropagation()">🔗 Website öffnen</a>'+
    '</div>'+
  '</div>';
}

function render(){
  var evs=filtered();
  document.getElementById('vc').textContent=evs.length;
  var wrap=document.getElementById('wrap');
  if(evs.length===0){wrap.innerHTML='<div class="egrid"><div class="empty"><div class="empty-em">🔍</div><p>Keine Events gefunden.</p></div></div>';return;}
  var lv=state.view==='list'?' lv':'';
  var showCats=state.cat==='all'&&!state.extra&&!state.q;
  if(showCats){
    var cats=[];evs.forEach(function(e){if(cats.indexOf(e.cat)<0)cats.push(e.cat);});
    var html='';
    cats.forEach(function(cat){
      var ces=evs.filter(function(e){return e.cat===cat;});
      var col=CAT_COLOR[cat]||'#888';var em=CAT_EMOJI[cat]||'';
      html+='<div class="cat-sec">'+
        '<div class="cat-hdr"><div class="cat-dot" style="background:'+col+'"></div>'+
        '<h2>'+em+' '+cat+'</h2><span class="cat-cnt">'+ces.length+' Events</span></div>'+
        '<div class="egrid'+lv+'">'+ces.map(card).join('')+'</div></div>';
    });
    wrap.innerHTML=html;
  } else {
    wrap.innerHTML='<div class="egrid'+lv+'">'+evs.map(card).join('')+'</div>';
  }
  // attach click handlers
  wrap.querySelectorAll('.ec').forEach(function(el){
    el.addEventListener('click',function(){
      var id=parseInt(el.getAttribute('data-id'));
      var wasOpen=el.classList.contains('open');
      wrap.querySelectorAll('.ec.open').forEach(function(o){o.classList.remove('open');});
      if(!wasOpen)el.classList.add('open');
    });
  });
}

function setView(v){
  state.view=v;
  document.getElementById('vg').classList.toggle('on',v==='grid');
  document.getElementById('vl').classList.toggle('on',v==='list');
  render();
}

// Cat filter buttons
document.querySelectorAll('.fb[data-f]').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.fb[data-f]').forEach(function(b){b.classList.remove('on');});
    btn.classList.add('on');
    state.cat=btn.getAttribute('data-f');
    render();
  });
});

// Extra filter buttons
document.querySelectorAll('.fb[data-x]').forEach(function(btn){
  btn.addEventListener('click',function(){
    var x=btn.getAttribute('data-x');
    var wasOn=btn.classList.contains('on');
    document.querySelectorAll('.fb[data-x]').forEach(function(b){b.classList.remove('on');});
    if(!wasOn){btn.classList.add('on');state.extra=x;}
    else{state.extra=null;}
    render();
  });
});

// Search
document.getElementById('sq').addEventListener('input',function(){state.q=this.value;render();});

// Initial render
render();
</script>
</body>
</html>
